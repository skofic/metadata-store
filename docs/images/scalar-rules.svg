<svg xmlns="http://www.w3.org/2000/svg" width="700" height="335"
     font-family="monospace" font-size="11" fill="#222">

  <!-- ===== OUTER: _type_scalar ===== -->
  <rect x="8" y="8" width="684" height="319" rx="8" fill="#f0f4ff" stroke="#4466cc" stroke-width="2"/>
  <text x="20" y="30" fill="#4466cc" font-size="12" font-weight="bold">_type_scalar</text>
  <text x="688" y="30" text-anchor="end" fill="#4466cc" font-size="10" font-style="italic">used by _scalar</text>

  <!-- Outer exclusive: text types -->
  <text x="22" y="52" fill="#666" font-size="10" font-style="italic">text types — non-comparable; not usable in sets or as dictionary keys:</text>
  <text x="22" y="68" fill="#333">_text  ·  _text_HTML  ·  _text_Markdown  ·  _text_SVG</text>

  <!-- ===== MIDDLE: _type_comparable ===== -->
  <rect x="16" y="80" width="668" height="241" rx="6" fill="#e2eaff" stroke="#2b65d9" stroke-width="1.5"/>
  <text x="28" y="100" fill="#2b65d9" font-size="12" font-weight="bold">_type_comparable</text>
  <text x="684" y="100" text-anchor="end" fill="#2b65d9" font-size="10" font-style="italic">used by _set · _nested</text>

  <!-- Middle exclusive: numbers + other comparable -->
  <text x="30" y="120" fill="#666" font-size="10" font-style="italic">adds number types and other comparable types — usable in sets but not as dictionary keys:</text>
  <text x="30" y="136" fill="#333">_number  ·  _number_float  ·  _number_integer  ·  _boolean  ·  _timestamp  ·  _string_regexp</text>

  <!-- ===== INNER: _type_key ===== -->
  <rect x="24" y="149" width="652" height="164" rx="5" fill="#d4e0ff" stroke="#1a3fa8" stroke-width="1.5"/>
  <text x="36" y="168" fill="#1a3fa8" font-size="12" font-weight="bold">_type_key</text>
  <text x="676" y="168" text-anchor="end" fill="#1a3fa8" font-size="10" font-style="italic">used by _dict_key</text>

  <!-- Inner: string family -->
  <text x="38" y="188" fill="#666" font-size="10" font-style="italic">string family:</text>
  <text x="38" y="204" fill="#333">_string · _string_URI · _string_Email · _string_Hostname · _string_IPv4 · _string_IPv6</text>
  <text x="38" y="220" fill="#333">_string_YMD · _string_date · _string_time · _string_date-time · _string_LaTeX · _string_HEX</text>

  <!-- Inner: term key family -->
  <text x="38" y="240" fill="#666" font-size="10" font-style="italic">term key family:</text>
  <text x="38" y="256" fill="#333">_term_key · _term_key_enum-root · _term_key_enum-item · _term_key_descriptor</text>

  <!-- Inner: other -->
  <text x="38" y="276" fill="#666" font-size="10" font-style="italic">other:</text>
  <text x="38" y="292" fill="#333">_handle · _enum</text>

</svg>
